name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de déclencher manuellement depuis GitHub

env:
  APP_NAME: carbonaze-backend
  RESOURCE_GROUP: rg-carbonaze
  CONTAINER_APP_ENV: carbonaze-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Connexion à Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Connexion à Azure Container Registry
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build et push de l'image Docker
      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 5. Déploiement sur Azure Container Apps
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: ${{ env.APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.IMAGE_TAG }}
          environmentVariables: |
            SPRING_DATASOURCE_URL=secretref:db-url
            SPRING_DATASOURCE_USERNAME=secretref:db-username
            SPRING_DATASOURCE_PASSWORD=secretref:db-password
            SPRING_PROFILES_ACTIVE=prod

      - name: Deployment summary
        run: |
          echo "✅ Déployé avec succès !"
          echo "🐳 Image: ${{ env.IMAGE_TAG }}"
          echo "☁️  App: ${{ env.APP_NAME }}"
