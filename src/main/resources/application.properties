spring.application.name=carbonaze-backend
spring.datasource.url=jdbc:h2:mem:carbonaze;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
carbonaze.security.enabled=true
carbonaze.jwt.secret=carbonaze-development-secret-key-change-me-2026
carbonaze.jwt.expiration-ms=86400000
