# ================================================
# application-prod.properties
# Les valeurs réelles sont injectées via les
# variables d'environnement Azure Container Apps
# ================================================

# Datasource PostgreSQL
# Ces valeurs viennent des secrets Azure (ne pas hardcoder ici !)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Hikari)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Server
server.port=8080

# Logging
logging.level.root=WARN
logging.level.com.carbonaze=INFO

# Security / JWT
carbonaze.security.enabled=true
carbonaze.jwt.secret=${CARBONAZE_JWT_SECRET}
carbonaze.jwt.expiration-ms=${CARBONAZE_JWT_EXPIRATION_MS:86400000}
